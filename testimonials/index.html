<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#070a0d">
<title>YOUBIONIC · TESTIMONIAL STORY GENERATOR</title>
<style>
:root{
  --bg:#070a0d; --panel:#0e151c; --line2:#26384a;
  --amber:#ffb000; --amber-dim:#7a5500; --teal:#23e0c8; --teal-dim:#0c5b53;
  --txt:#cfe3ef; --dim:#7d93a3; --faint:#4a5d6c;
  --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,"Roboto Mono",monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--mono);overflow:hidden;}

#card{position:relative;width:100%;height:100%;display:flex;flex-direction:column;
  background:var(--bg);overflow:hidden;}

/* photo layer */
#photo{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.34;filter:saturate(.75) contrast(1.05);}
#veil{position:absolute;inset:0;
  background:
    radial-gradient(circle at 50% 12%,rgba(255,176,0,.10),transparent 58%),
    linear-gradient(180deg,rgba(7,10,13,.72) 0%,rgba(7,10,13,.55) 38%,rgba(7,10,13,.93) 78%,#070a0d 100%);}
#grid{position:absolute;inset:0;opacity:.5;
  background-image:linear-gradient(rgba(35,224,200,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(35,224,200,.045) 1px,transparent 1px);
  background-size:34px 34px;}

.inner{position:relative;z-index:2;display:flex;flex-direction:column;height:100%;padding:5.2% 6.4%;}

/* header */
.brand{display:flex;align-items:baseline;gap:.5em;letter-spacing:.05em;}
.brand b{color:var(--amber);font-size:2.9vh;font-weight:700;}
.brand i{font-style:normal;color:var(--teal);font-size:2.4vh;}
.brand span{color:var(--dim);font-size:1.7vh;letter-spacing:.18em;}

.tagline{margin-top:1.2vh;font-size:1.55vh;color:var(--faint);letter-spacing:.22em;text-transform:uppercase;}

/* quote block */
.qwrap{flex:1;display:flex;flex-direction:column;justify-content:center;padding:2vh 0;}
.qmark{color:var(--amber);font-size:9vh;line-height:.6;opacity:.5;font-weight:700;}
.quote{font-size:3.35vh;line-height:1.42;color:#eaf6f8;font-weight:500;letter-spacing:-.01em;margin-top:1.4vh;
  text-shadow:0 2px 22px rgba(0,0,0,.75);}
.quote.long{font-size:2.85vh;}
.quote.xlong{font-size:2.45vh;}

/* attribution */
.attr{margin-top:3.2vh;padding-top:2.4vh;border-top:1px solid rgba(255,176,0,.35);}
.attr .name{color:var(--amber);font-size:2.5vh;font-weight:700;letter-spacing:.02em;}
.attr .role{color:var(--teal);font-size:1.85vh;margin-top:.7vh;line-height:1.4;}
.attr .org{color:var(--txt);font-size:1.95vh;margin-top:.3vh;font-weight:600;}

/* footer badge */
.foot{display:flex;flex-direction:column;align-items:center;gap:1.5vh;padding-bottom:1vh;}
.foot .cta{color:var(--dim);font-size:1.7vh;letter-spacing:.16em;text-transform:uppercase;}
.pill{border:2px solid var(--teal);border-radius:1.4vh;background:rgba(14,21,28,.92);
  padding:1.5vh 3vh;color:var(--teal);font-size:2.15vh;font-weight:700;letter-spacing:.02em;}

/* verified chip */
.chip{position:absolute;top:0;right:0;display:flex;align-items:center;gap:.6em;
  border:1px solid var(--line2);border-radius:.5vh;background:rgba(14,21,28,.85);
  padding:.7vh 1.3vh;font-size:1.35vh;color:var(--dim);letter-spacing:.1em;}
.chip .dot{width:.9vh;height:.9vh;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal);}
.head{position:relative;}
</style>
</head>
<body>
<div id="card">
  <div id="photo"></div>
  <div id="grid"></div>
  <div id="veil"></div>

  <div class="inner">
    <div class="head">
      <div class="brand"><b>YOUBIONIC</b><i>//</i><span>REAL BUILDERS</span></div>
      <div class="tagline">What our community says</div>
      <div class="chip"><span class="dot"></span>VERIFIED</div>
    </div>

    <div class="qwrap">
      <div class="qmark">&ldquo;</div>
      <div class="quote" id="quote">Loading…</div>
      <div class="attr">
        <div class="name" id="name"></div>
        <div class="org" id="org"></div>
        <div class="role" id="role"></div>
      </div>
    </div>

    <div class="foot">
      <div class="cta">Build your own humanoid robot</div>
      <div class="pill" id="pill">youbionic.com</div>
    </div>
  </div>
</div>

<script>
const params=new URLSearchParams(location.search);
const wantId=params.get('id');
const wantSeg=params.get('segment');
const link=params.get('link')||'youbionic.com';
document.getElementById('pill').textContent=link;

function pick(list){
  if(wantId){const f=list.find(t=>t.id===wantId); if(f) return f;}
  let pool=list;
  if(wantSeg) pool=list.filter(t=>t.segment===wantSeg);
  if(!pool.length) pool=list;
  // weight by priority (1 = highest)
  const weighted=[];
  pool.forEach(t=>{const w=4-(t.priority||3); for(let i=0;i<Math.max(1,w);i++) weighted.push(t);});
  return weighted[Math.floor(Math.random()*weighted.length)];
}

function render(t){
  const q=document.getElementById('quote');
  const txt=t.pull||t.quote_full||'';
  q.textContent=txt;
  q.className='quote'+(txt.length>150?' xlong':txt.length>105?' long':'');
  document.getElementById('name').textContent=t.name||'';
  document.getElementById('org').textContent=t.org||'';
  document.getElementById('role').textContent=t.role||'';
  // try customer robot photo
  const img=new Image();
  img.onload=()=>{document.getElementById('photo').style.backgroundImage=`url(photos/${t.id}.jpg)`;};
  img.onerror=()=>{};
  img.src=`photos/${t.id}.jpg`;
  document.title='YOUBIONIC · '+(t.name||'Testimonial');
}

fetch('testimonials.json?cb='+Date.now())
  .then(r=>r.json())
  .then(d=>render(pick(d.testimonials)))
  .catch(e=>{document.getElementById('quote').textContent='Could not load testimonials.';});
</script>
</body>
</html>
