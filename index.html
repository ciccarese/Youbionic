<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Youbionic</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
  }
  .logo {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px;
    margin: 0 auto 28px;
    box-shadow: 0 0 40px rgba(124,58,237,0.4);
  }
  h1 {
    font-size: 3rem; font-weight: 800;
    background: linear-gradient(135deg, #a78bfa, #818cf8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
  }
  .tagline { color: #7d8590; font-size: 1.1rem; margin-bottom: 50px; }
  .cards {
    display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;
    max-width: 700px;
  }
  .card {
    background: #161b22; border: 1px solid #21262d; border-radius: 16px;
    padding: 32px 36px; text-decoration: none; color: inherit;
    transition: all 0.25s; min-width: 200px; flex: 1;
  }
  .card:hover {
    border-color: #7c3aed;
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(124,58,237,0.2);
  }
  .card-icon { font-size: 2.5rem; margin-bottom: 14px; }
  .card-title { font-size: 1.1rem; font-weight: 700; color: #e6edf3; margin-bottom: 6px; }
  .card-desc { font-size: 0.82rem; color: #7d8590; }
  .card-arrow {
    display: inline-block; margin-top: 16px;
    color: #7c3aed; font-size: 1.2rem;
    transition: transform 0.2s;
  }
  .card:hover .card-arrow { transform: translateX(4px); }
  footer {
    margin-top: 60px; color: #484f58; font-size: 0.78rem;
  }
  footer a { color: #7c3aed; text-decoration: none; }
</style>
</head>
<body>

<div class="logo">🦾</div>
<h1>Youbionic</h1>
<p class="tagline">Repository dei progetti digitali</p>

<div class="cards">
  <a class="card" href="projects/">
    <div class="card-icon">🌐</div>
    <div class="card-title">Projects</div>
    <div class="card-desc">Tutti i progetti HTML — si aggiorna in automatico quando aggiungi file</div>
    <span class="card-arrow">→</span>
  </a>
</div>

<footer>
  <p>Youbionic · <a href="https://github.com/ciccarese/Youbionic" target="_blank">GitHub Repository</a></p>
</footer>

</body>
</html>
