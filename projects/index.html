<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Youbionic — Projects</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #1a1f2e 0%, #0d1117 100%);
    border-bottom: 1px solid #21262d;
    padding: 32px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo { display: flex; align-items: center; gap: 14px; }
  .logo-icon {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }
  h1 { font-size: 1.6rem; font-weight: 700; color: #fff; }
  h1 span { color: #a78bfa; }
  .subtitle { font-size: 0.85rem; color: #7d8590; margin-top: 2px; }
  .back-link {
    color: #7d8590; text-decoration: none; font-size: 0.85rem;
    border: 1px solid #30363d; padding: 6px 14px; border-radius: 6px;
    transition: all 0.2s;
  }
  .back-link:hover { color: #e6edf3; border-color: #7c3aed; }

  main { padding: 40px; max-width: 1200px; margin: 0 auto; }

  .stats-bar {
    display: flex; gap: 24px; margin-bottom: 32px;
    padding: 16px 24px;
    background: #161b22; border: 1px solid #21262d; border-radius: 10px;
  }
  .stat { text-align: center; }
  .stat-num { font-size: 1.4rem; font-weight: 700; color: #a78bfa; }
  .stat-label { font-size: 0.75rem; color: #7d8590; margin-top: 2px; }

  .search-bar {
    display: flex; gap: 12px; margin-bottom: 28px; align-items: center;
  }
  .search-bar input {
    flex: 1; background: #161b22; border: 1px solid #30363d;
    color: #e6edf3; padding: 10px 16px; border-radius: 8px;
    font-size: 0.9rem; outline: none;
  }
  .search-bar input:focus { border-color: #7c3aed; }
  .search-bar input::placeholder { color: #7d8590; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }
  .card {
    background: #161b22; border: 1px solid #21262d; border-radius: 12px;
    padding: 24px; text-decoration: none; color: inherit;
    transition: all 0.2s; display: block; position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, #7c3aed, #4f46e5);
    opacity: 0; transition: opacity 0.2s;
  }
  .card:hover { border-color: #7c3aed; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,58,237,0.15); }
  .card:hover::before { opacity: 1; }
  .card-icon { font-size: 2rem; margin-bottom: 12px; }
  .card-name { font-size: 1rem; font-weight: 600; color: #e6edf3; margin-bottom: 6px; word-break: break-word; }
  .card-meta { font-size: 0.78rem; color: #7d8590; }
  .card-badge {
    display: inline-block; font-size: 0.7rem; background: rgba(124,58,237,0.2);
    color: #a78bfa; border: 1px solid rgba(124,58,237,0.3);
    padding: 2px 8px; border-radius: 20px; margin-top: 10px; text-transform: uppercase;
  }

  .empty {
    grid-column: 1/-1; text-align: center; padding: 80px 20px; color: #7d8590;
  }
  .empty-icon { font-size: 3rem; margin-bottom: 16px; }

  .loading { grid-column: 1/-1; text-align: center; padding: 60px; color: #7d8590; }

  footer {
    text-align: center; padding: 24px; color: #7d8590; font-size: 0.8rem;
    border-top: 1px solid #21262d; margin-top: 60px;
  }
  footer a { color: #7c3aed; text-decoration: none; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🦾</div>
    <div>
      <h1>Youbionic <span>Projects</span></h1>
      <div class="subtitle">Tutti i progetti HTML del repository</div>
    </div>
  </div>
  <a href="../" class="back-link">← Home</a>
</header>

<main>
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-num" id="total-count">—</div>
      <div class="stat-label">Progetti</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="html-count">—</div>
      <div class="stat-label">Pagine HTML</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="other-count">—</div>
      <div class="stat-label">Altri file</div>
    </div>
  </div>

  <div class="search-bar">
    <input type="text" id="search" placeholder="🔍  Cerca progetto..." oninput="filterCards()">
  </div>

  <div class="grid" id="grid">
    <div class="loading">⏳ Caricamento progetti...</div>
  </div>
</main>

<footer>
  <p>Youbionic Projects • Aggiornato automaticamente da <a href="https://github.com/ciccarese/Youbionic" target="_blank">GitHub</a></p>
</footer>

<script>
const API = 'https://api.github.com/repos/ciccarese/Youbionic/contents/projects';
const BASE = 'https://ciccarese.github.io/Youbionic/projects/';

const ICONS = {
  html: '🌐', htm: '🌐',
  pdf: '📄', png: '🖼️', jpg: '🖼️', jpeg: '🖼️', gif: '🖼️', svg: '🎨',
  xlsx: '📊', xls: '📊', csv: '📊',
  zip: '📦', rar: '📦', pptx: '📊', docx: '📝',
};

let allFiles = [];

async function loadProjects() {
  try {
    const r = await fetch(API);
    const files = await r.json();

    if (!Array.isArray(files)) {
      document.getElementById('grid').innerHTML = '<div class="empty"><div class="empty-icon">📂</div><p>Nessun progetto ancora.<br>Carica i tuoi file HTML in questa cartella!</p></div>';
      updateStats(0, 0, 0);
      return;
    }

    allFiles = files.filter(f => f.type === 'file' && !f.name.startsWith('.') && f.name !== 'index.html');
    renderCards(allFiles);
  } catch(e) {
    document.getElementById('grid').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><p>Errore caricamento. Riprova tra poco.</p></div>';
  }
}

function renderCards(files) {
  const grid = document.getElementById('grid');
  const htmlFiles = files.filter(f => /\.html?$/i.test(f.name));
  const otherFiles = files.filter(f => !/\.html?$/i.test(f.name));
  updateStats(files.length, htmlFiles.length, otherFiles.length);

  if (files.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">📂</div><p>Nessun progetto ancora.<br>Carica i tuoi file HTML in questa cartella!</p></div>';
    return;
  }

  grid.innerHTML = files.map(f => {
    const ext = f.name.split('.').pop().toLowerCase();
    const icon = ICONS[ext] || '📁';
    const isHtml = /html?$/i.test(f.name);
    const label = f.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
    const url = isHtml ? BASE + f.name : f.download_url;
    return `<a class="card" href="${url}" target="_blank">
      <div class="card-icon">${icon}</div>
      <div class="card-name">${label}</div>
      <div class="card-meta">${f.name}</div>
      <span class="card-badge">${ext.toUpperCase()}</span>
    </a>`;
  }).join('');
}

function updateStats(total, html, other) {
  document.getElementById('total-count').textContent = total;
  document.getElementById('html-count').textContent = html;
  document.getElementById('other-count').textContent = other;
}

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = allFiles.filter(f => f.name.toLowerCase().includes(q));
  renderCards(filtered);
}

loadProjects();
</script>
</body>
</html>
